# 🪙 FixoriumPay Cloudflare Configuration
# ---------------------------------------

# Your project name (appears in Cloudflare dashboard)
name = "fixoriumpay"

# The directory containing your built static assets (from Vite)
pages_build_output_dir = "dist/spa"

# Date that defines the runtime compatibility for your Cloudflare Functions
compatibility_date = "2025-10-07"

# Optional: enable automatic updates for new runtime features
compatibility_flags = ["nodejs_compat"]

# Optional: observability (helps with logs, debugging)
[observability]
enabled = true

# Optional: environment variables (safe defaults, you can add more in Cloudflare Dashboard)
[vars]
NODE_ENV = "production"

# Functions live under /functions — Cloudflare will auto-detect them.
# No need to specify routes manually unless you want custom rules.

# Example route override (optional):
# [routes]
#   pattern = "/api/*"
#   zone_name = "fixorium.com.pk"
